services:
  - type: web
    name: customer-support-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app # Update your Render 'startCommand' in the dashboard or render.yaml
    envVars:
      - key: DB_URL
        fromDatabase:
          name: customer_support_db
          property: ""
      - key: ASYNC_DB_URL
        value: ""
      - key: SECRET_KEY
        value: ""
      - key: ALGORITHM
        value: "HS256"
      -key: GEMINI_API_KEY
        value: ""
      -key: SUPPORT_SECRET
        value: ""
      -key: FRONTEND_URL
        value: "https://customer-support-agent-frontend-64b.vercel.app/"


databases:
  - name: customer_support_db
    plan: free # Change to 'standard' for production scale
    databaseName: ""
    user: 